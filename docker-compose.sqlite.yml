services:
  myna:
    image: ghcr.io/uskyu/myna:latest
    container_name: myna-app
    restart: unless-stopped
    network_mode: host
    environment:
      - PORT=3456
      - DB_TYPE=sqlite
    volumes:
      - ./data/db:/app/db
      - ./data:/app/data
      - /root/.hermes/profiles:/root/.hermes/profiles
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.sqlite.yml:/app/docker-compose.yml:ro
