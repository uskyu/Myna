<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="devGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d6a4f"/>
      <stop offset="100%" style="stop-color:#40916c"/>
    </linearGradient>
    <linearGradient id="testGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">@提及 → 自动触发 → 链式协作</text>
  
  <!-- User Node -->
  <g filter="url(#shadow)">
    <rect x="60" y="140" width="160" height="70" rx="12" fill="url(#userGrad)"/>
    <text x="140" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="white">👤</text>
    <text x="140" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">用户</text>
  </g>
  
  <!-- Dev Node -->
  <g filter="url(#shadow)">
    <rect x="320" y="80" width="160" height="70" rx="12" fill="url(#devGrad)"/>
    <text x="400" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="white">🛠</text>
    <text x="400" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">程序开发</text>
  </g>
  
  <!-- Test Node -->
  <g filter="url(#shadow)">
    <rect x="320" y="200" width="160" height="70" rx="12" fill="url(#testGrad)"/>
    <text x="400" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="white">🧪</text>
    <text x="400" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">程序测试员</text>
  </g>
  
  <!-- Result Node -->
  <g filter="url(#shadow)">
    <rect x="580" y="140" width="160" height="70" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <text x="660" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="white">✅</text>
    <text x="660" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0">任务完成</text>
  </g>
  
  <!-- Arrow: User → Dev -->
  <path d="M220 155 L310 120" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowAmber)"/>
  <text x="250" y="125" font-family="system-ui, sans-serif" font-size="11" fill="#fbbf24" font-weight="500">@程序开发 做个功能</text>
  
  <!-- Arrow: Dev → Test -->
  <path d="M400 150 L400 195" stroke="#40916c" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <text x="415" y="178" font-family="system-ui, sans-serif" font-size="11" fill="#6ee7b7" font-weight="500">@程序测试员 帮忙测试</text>
  
  <!-- Arrow: Test → Dev (feedback loop) -->
  <path d="M320 220 C280 220 280 100 320 100" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-dasharray="5,4" marker-end="url(#arrowPurple)"/>
  <text x="255" y="165" font-family="system-ui, sans-serif" font-size="10" fill="#a5b4fc" font-weight="500">发现bug</text>
  <text x="248" y="178" font-family="system-ui, sans-serif" font-size="10" fill="#a5b4fc" font-weight="500">@程序开发</text>
  
  <!-- Arrow: Test → Result -->
  <path d="M480 225 L575 190" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowPurple)"/>
  <text x="510" y="218" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc" font-weight="500">测试通过 ✓</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowAmber" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#40916c"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#818cf8"/>
    </marker>
  </defs>
  
  <!-- Bottom description -->
  <g>
    <rect x="100" y="310" width="600" height="60" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="400" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">用户只需说一句话，智能体通过 <tspan fill="#fbbf24" font-weight="600">@提及</tspan> 自动接力</text>
    <text x="400" y="357" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">开发 → 测试 → 反馈 → 修复 → 通过，全程无需人工干预</text>
  </g>
</svg>
