services:
  myna:
    image: ghcr.io/uskyu/myna:latest
    container_name: myna-app
    restart: unless-stopped
    network_mode: host
    environment:
      - PORT=3456
      - DB_TYPE=sqlite
      - WATCHTOWER_UPDATE_URL=http://localhost:8080/v1/update
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN:-myna-local-update-token}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - app_db:/app/db
      - app_data:/app/data
      - hermes_profiles:/root/.hermes/profiles
      - ./docker-compose.yml:/app/docker-compose.yml:ro

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    network_mode: host
    environment:
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN:-myna-local-update-token}
    command:
      - --label-enable
      - --cleanup
      - --http-api-update
      - --http-api-periodic-polls
      - --interval
      - "300"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  app_db:
  app_data:
  hermes_profiles:
