<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myna - Token 使用量看板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 24px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .header select, .header button {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .header select:hover, .header button:hover {
            border-color: #60a5fa;
            background: #1e3a5f;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1e293b, #1a2332);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }
        .stat-card.blue::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .stat-card.purple::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
        .stat-card.green::before { background: linear-gradient(90deg, #10b981, #34d399); }
        .stat-card.orange::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .stat-card .label {
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #f1f5f9;
        }
        .stat-card .sub {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }
        .chart-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
        }
        .chart-section h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #f1f5f9;
        }
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
        canvas { width: 100% !important; height: 100% !important; }
        .table-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
        }
        .table-section h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #f1f5f9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #1e293b;
        }
        th {
            background: #0f172a;
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        td {
            color: #e2e8f0;
            font-size: 14px;
        }
        tr:hover td { background: rgba(96, 165, 250, 0.05); }
        .agent-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .agent-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .bar-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .bar-bg {
            flex: 1;
            height: 6px;
            background: #0f172a;
            border-radius: 3px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .token-num {
            font-variant-numeric: tabular-nums;
            font-weight: 500;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 15px; }
        .refresh-btn {
            background: none;
            border: none;
            color: #60a5fa;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .refresh-btn:hover { color: #93c5fd; }
        @media (max-width: 768px) {
            body { padding: 16px; }
            .header { flex-direction: column; gap: 16px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .stat-card .value { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Token 使用量看板</h1>
        <div class="controls">
            <select id="daysSelect">
                <option value="7">最近 7 天</option>
                <option value="14">最近 14 天</option>
                <option value="30" selected>最近 30 天</option>
                <option value="90">最近 90 天</option>
            </select>
            <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
        </div>
    </div>

    <div class="stats-grid" id="statsGrid">
        <div class="stat-card blue">
            <div class="label">总消耗 Token</div>
            <div class="value" id="totalTokens">-</div>
            <div class="sub" id="totalSub">加载中...</div>
        </div>
        <div class="stat-card purple">
            <div class="label">输入 Token</div>
            <div class="value" id="inputTokens">-</div>
            <div class="sub" id="inputSub">-</div>
        </div>
        <div class="stat-card green">
            <div class="label">输出 Token</div>
            <div class="value" id="outputTokens">-</div>
            <div class="sub" id="outputSub">-</div>
        </div>
        <div class="stat-card orange">
            <div class="label">活跃智能体</div>
            <div class="value" id="agentCount">-</div>
            <div class="sub" id="agentSub">-</div>
        </div>
    </div>

    <div class="chart-section">
        <h2>📈 每日 Token 消耗趋势</h2>
        <div class="chart-container">
            <canvas id="dailyChart"></canvas>
        </div>
    </div>

    <div class="table-section">
        <h2>🤖 每个智能体消耗明细</h2>
        <table>
            <thead>
                <tr>
                    <th>智能体</th>
                    <th>总 Token</th>
                    <th>输入 Token</th>
                    <th>输出 Token</th>
                    <th>调用次数</th>
                    <th>占比</th>
                </tr>
            </thead>
            <tbody id="agentTableBody">
                <tr><td colspan="6" class="empty-state">
                    <div class="icon">📭</div>
                    <p>暂无数据</p>
                </td></tr>
            </tbody>
        </table>
    </div>

    <div class="table-section">
        <h2>📅 每日汇总</h2>
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>总 Token</th>
                    <th>输入 Token</th>
                    <th>输出 Token</th>
                    <th>活跃智能体数</th>
                    <th>调用次数</th>
                </tr>
            </thead>
            <tbody id="dailyTableBody">
                <tr><td colspan="6" class="empty-state">
                    <div class="icon">📭</div>
                    <p>暂无数据</p>
                </td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const COLORS = [
            '#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444',
            '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#84cc16'
        ];

        function formatNum(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return n.toString();
        }

        function getAuthHeaders() {
            const headers = { 'Content-Type': 'application/json' };
            // Try to get auth cookie or token
            return headers;
        }

        async function fetchJSON(url) {
            const resp = await fetch(url, { headers: getAuthHeaders(), credentials: 'same-origin' });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            return resp.json();
        }

        async function loadData() {
            const days = document.getElementById('daysSelect').value;
            try {
                const [summaryResp, agentResp] = await Promise.all([
                    fetchJSON(`/admin/token-usage/summary?days=${days}`),
                    fetchJSON(`/admin/token-usage/by-agent?days=${days}`)
                ]);

                if (summaryResp.ok) renderSummary(summaryResp.result);
                if (agentResp.ok) renderAgentTable(agentResp.result, summaryResp.result?.totals);
            } catch (e) {
                console.error('Load error:', e);
            }
        }

        function renderSummary(data) {
            const { daily, totals } = data;
            const t = totals || {};

            document.getElementById('totalTokens').textContent = formatNum(t.total_all || 0);
            document.getElementById('totalSub').textContent = `${(t.call_count || 0)} 次调用`;

            document.getElementById('inputTokens').textContent = formatNum(t.total_input || 0);
            const inputPct = t.total_all ? Math.round(t.total_input / t.total_all * 100) : 0;
            document.getElementById('inputSub').textContent = `占比 ${inputPct}%`;

            document.getElementById('outputTokens').textContent = formatNum(t.total_output || 0);
            const outputPct = t.total_all ? Math.round(t.total_output / t.total_all * 100) : 0;
            document.getElementById('outputSub').textContent = `占比 ${outputPct}%`;

            document.getElementById('agentCount').textContent = t.agent_count || 0;
            document.getElementById('agentSub').textContent = `最近 ${document.getElementById('daysSelect').value} 天`;

            renderDailyChart(daily || []);
        }

        function renderDailyChart(daily) {
            const canvas = document.getElementById('dailyChart');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            const W = rect.width;
            const H = rect.height;
            const pad = { top: 20, right: 20, bottom: 40, left: 70 };
            const chartW = W - pad.left - pad.right;
            const chartH = H - pad.top - pad.bottom;

            ctx.clearRect(0, 0, W, H);

            if (!daily.length) {
                ctx.fillStyle = '#64748b';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('暂无数据', W / 2, H / 2);
                return;
            }

            // Sort by date ascending
            const sorted = [...daily].sort((a, b) => a.date.localeCompare(b.date));
            const maxVal = Math.max(...sorted.map(d => d.total_tokens), 1);

            // Grid lines
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = pad.top + (chartH / 4) * i;
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(W - pad.right, y);
                ctx.stroke();

                ctx.fillStyle = '#64748b';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(formatNum(Math.round(maxVal * (4 - i) / 4)), pad.left - 10, y + 4);
            }

            const barW = Math.min(40, chartW / sorted.length * 0.7);
            const gap = chartW / sorted.length;

            sorted.forEach((d, i) => {
                const x = pad.left + gap * i + (gap - barW) / 2;
                const h = (d.total_tokens / maxVal) * chartH;
                const y = pad.top + chartH - h;

                // Gradient bar
                const grad = ctx.createLinearGradient(x, y, x, pad.top + chartH);
                grad.addColorStop(0, '#60a5fa');
                grad.addColorStop(1, '#3b82f6');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.roundRect(x, y, barW, h, [4, 4, 0, 0]);
                ctx.fill();

                // Date label
                ctx.fillStyle = '#64748b';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'center';
                const dateLabel = d.date.slice(5); // MM-DD
                ctx.fillText(dateLabel, x + barW / 2, pad.top + chartH + 20);
            });
        }

        function renderAgentTable(agentData, totals) {
            const tbody = document.getElementById('agentTableBody');
            if (!agentData || !agentData.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><div class="icon">📭</div><p>暂无智能体消耗数据</p></td></tr>';
                return;
            }

            // Aggregate by agent
            const agentMap = {};
            agentData.forEach(d => {
                if (!agentMap[d.agent_id]) {
                    agentMap[d.agent_id] = {
                        agent_id: d.agent_id,
                        agent_name: d.agent_name,
                        input_tokens: 0,
                        output_tokens: 0,
                        total_tokens: 0,
                        call_count: 0
                    };
                }
                const a = agentMap[d.agent_id];
                a.input_tokens += d.input_tokens;
                a.output_tokens += d.output_tokens;
                a.total_tokens += d.total_tokens;
                a.call_count += d.call_count;
            });

            const agents = Object.values(agentMap).sort((a, b) => b.total_tokens - a.total_tokens);
            const maxTokens = Math.max(...agents.map(a => a.total_tokens), 1);
            const grandTotal = agents.reduce((s, a) => s + a.total_tokens, 0);

            tbody.innerHTML = agents.map((a, i) => {
                const pct = grandTotal ? Math.round(a.total_tokens / grandTotal * 100) : 0;
                const barPct = Math.round(a.total_tokens / maxTokens * 100);
                const color = COLORS[i % COLORS.length];
                return `<tr>
                    <td>
                        <div class="agent-badge">
                            <span class="agent-dot" style="background:${color}"></span>
                            ${a.agent_name || a.agent_id}
                        </div>
                    </td>
                    <td class="token-num">${formatNum(a.total_tokens)}</td>
                    <td class="token-num">${formatNum(a.input_tokens)}</td>
                    <td class="token-num">${formatNum(a.output_tokens)}</td>
                    <td>${a.call_count}</td>
                    <td>
                        <div class="bar-cell">
                            <div class="bar-bg"><div class="bar-fill" style="width:${barPct}%;background:${color}"></div></div>
                            <span style="min-width:40px;text-align:right">${pct}%</span>
                        </div>
                    </td>
                </tr>`;
            }).join('');

            renderDailyTable(agentData);
        }

        function renderDailyTable(agentData) {
            const tbody = document.getElementById('dailyTableBody');
            // Aggregate by date
            const dateMap = {};
            agentData.forEach(d => {
                if (!dateMap[d.date]) {
                    dateMap[d.date] = { date: d.date, input_tokens: 0, output_tokens: 0, total_tokens: 0, agents: new Set(), call_count: 0 };
                }
                const row = dateMap[d.date];
                row.input_tokens += d.input_tokens;
                row.output_tokens += d.output_tokens;
                row.total_tokens += d.total_tokens;
                row.agents.add(d.agent_id);
                row.call_count += d.call_count;
            });

            const rows = Object.values(dateMap).sort((a, b) => b.date.localeCompare(a.date));

            if (!rows.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><div class="icon">📭</div><p>暂无每日汇总数据</p></td></tr>';
                return;
            }

            tbody.innerHTML = rows.map(r => `
                <tr>
                    <td>${r.date}</td>
                    <td class="token-num">${formatNum(r.total_tokens)}</td>
                    <td class="token-num">${formatNum(r.input_tokens)}</td>
                    <td class="token-num">${formatNum(r.output_tokens)}</td>
                    <td>${r.agents.size}</td>
                    <td>${r.call_count}</td>
                </tr>
            `).join('');
        }

        // Polyfill roundRect for older browsers
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
                const r = Array.isArray(radii) ? radii[0] : radii;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
            };
        }

        document.getElementById('daysSelect').addEventListener('change', loadData);
        loadData();
    </script>
</body>
</html>
