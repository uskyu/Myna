services:
  mysql:
    image: mysql:8.0
    container_name: myna-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: myna_root_2024
      MYSQL_DATABASE: myna
      MYSQL_USER: myna
      MYSQL_PASSWORD: myna
    network_mode: host
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  myna:
    image: ghcr.io/uskyu/myna:latest
    container_name: myna-app
    restart: unless-stopped
    network_mode: host
    environment:
      - PORT=3456
      - DB_TYPE=mysql
      - MYSQL_HOST=127.0.0.1
      - MYSQL_PORT=3306
      - MYSQL_USER=myna
      - MYSQL_PASSWORD=myna
      - MYSQL_DATABASE=myna
    volumes:
      - app_data:/app/data
      - hermes_profiles:/root/.hermes/profiles
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/app/docker-compose.yml:ro

volumes:
  mysql_data:
  app_data:
  hermes_profiles:
